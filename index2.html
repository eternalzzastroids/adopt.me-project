<!DOCTYPE html>

                </button>
        </div>
    </div>

            <h1>pets</h1>
        </div>
        <div class="search-and-stuff">
        <input type="search" placeholder="search..." class="search">
        <select name="---" id="" class="rarity">
            <option value="">common</option>
            <option value="">uncommon</option>
            <option value="">rare</option>
            <option value="">ultra-rare</option>
            <option value="">legendary</option>
        </select>
        <select name="alphabetically" id="" class="alphabetical">
            <option value="">alphabetically</option>
            <option value="">reverse</option>
        </select>
        </div>
        <div class="pets2">
        
                <div class="card">
                    <img src="https://cdn.playadopt.me/items/2021_uplift_butterfly.png" alt="" class="image-photo">

                </div>
                <div class="card">
                    <img src="https://cdn.playadopt.me/items/birthday_2022_uplift_butterfly.png" alt="" class="image-photo">
